<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spanish Verb Conjugation Practice</title>
    <link rel="stylesheet" href="/public/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">Spanish learning starter</p>
        <h1>Practice regular verb conjugations</h1>
        <p class="intro">
          Each round picks a random regular Spanish verb and tense so you can build confidence with real practice.
        </p>
      </section>

      <section class="card" aria-live="polite">
        <div class="filters">
          <p class="challenge-label">Choose tenses</p>
          <div id="tense-filters" class="checkbox-grid"></div>
        </div>

        <p class="challenge-label">Current challenge</p>
        <h2 id="prompt">Loading your first exercise…</h2>

        <label class="input-label" for="answer">Your answer</label>
        <div class="input-wrapper">
          <input id="answer" name="answer" type="text" placeholder="Type the conjugation" autocomplete="off" />
          <div class="progress-track" aria-hidden="true">
            <div id="answer-progress" class="progress-bar"></div>
          </div>
        </div>

        <div class="actions">
          <button id="check-btn" type="button">Check answer</button>
          <button id="prev-btn" class="secondary" type="button">Previous challenge</button>
          <button id="next-btn" class="secondary" type="button">Next challenge</button>
        </div>

        <p id="feedback" class="feedback" aria-live="polite"></p>
      </section>
    </main>

    <script src="/public/app.js"></script>
  </body>
</html>
