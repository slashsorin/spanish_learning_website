<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spanish Verb Conjugation Practice</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">Spanish learning starter</p>
        <h1>Practice regular verb conjugations</h1>
        <p class="intro">
          Each round picks a random regular Spanish verb and tense so you can build confidence with real practice.
        </p>
      </section>

      <section class="card" aria-live="polite">
        <div class="filters">
          <div class="filters-header">
            <p class="challenge-label">Choose tenses</p>
            <button id="tense-filter-toggle" class="secondary filter-toggle" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="tense-sheet">
              Choose tenses
            </button>
          </div>
          <p id="tense-summary" class="tense-summary">Selected: Present</p>
        </div>

        <p class="challenge-label">Current challenge</p>
        <h2 id="prompt">Loading your first exercise…</h2>
        <div id="translation" class="translation-box" aria-live="polite"></div>

        <label class="input-label" for="answer">Your answer</label>
        <div class="input-wrapper">
          <input id="answer" name="answer" type="text" placeholder="Type the conjugation" autocomplete="off" />
          <div class="progress-track" aria-hidden="true">
            <div id="answer-progress" class="progress-bar"></div>
          </div>
        </div>

        <div class="actions">
          <button id="prev-btn" class="secondary" type="button">Previous challenge</button>
          <button id="next-btn" class="secondary" type="button">Next challenge</button>
          <button id="hint-btn" class="secondary" type="button">Hint</button>
        </div>

        <p id="feedback" class="feedback" aria-live="polite"></p>
      </section>

      <div id="tense-sheet-backdrop" class="sheet-backdrop" hidden></div>
      <section id="tense-sheet" class="tense-sheet" role="dialog" aria-modal="true" aria-labelledby="tense-sheet-title" hidden>
        <div class="tense-sheet-header">
          <div>
            <p class="challenge-label">Choose tenses</p>
            <h3 id="tense-sheet-title">Select one or more tenses</h3>
          </div>
          <button id="tense-sheet-close" class="secondary sheet-close" type="button">Close</button>
        </div>

        <div id="tense-chip-list" class="tense-chip-list"></div>

        <div class="sheet-actions">
          <button id="tense-sheet-apply" type="button">Apply filters</button>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
